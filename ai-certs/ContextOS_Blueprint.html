<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContextOS Blueprint</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f3f5f7;margin:0;padding:24px}
.container{max-width:1400px;margin:auto}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
h1,h2{margin:0 0 12px}
.flow{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.node{background:#eef4ff;padding:12px 16px;border-radius:10px}
.arrow{font-size:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px;text-align:left}
th{background:#f7f7f7}
</style>
</head>
<body>
<div class="container">

<div class="card">
<h1>ContextOS</h1>
<p>上下文感知个人 AI 操作层</p>
</div>

<div class="card">
<h2>核心流程</h2>
<div class="flow">
<div class="node">用户工作</div>
<div class="arrow">→</div>
<div class="node">感知场景</div>
<div class="arrow">→</div>
<div class="node">加载记忆</div>
<div class="arrow">→</div>
<div class="node">AI决策</div>
<div class="arrow">→</div>
<div class="node">主动辅助</div>
</div>
</div>

<div class="card">
<h2>输入场景</h2>
<div class="grid">
<div class="node">WhatsApp</div>
<div class="node">飞书</div>
<div class="node">Outlook</div>
<div class="node">Cursor</div>
<div class="node">Chrome</div>
<div class="node">Word</div>
</div>
</div>

<div class="card">
<h2>Context Engine</h2>
<div class="grid">
<div class="card"><b>Application</b><br>当前软件<br>当前窗口</div>
<div class="card"><b>Project</b><br>D365<br>ERP<br>GFTI</div>
<div class="card"><b>User</b><br>习惯<br>语言<br>角色</div>
<div class="card"><b>Memory</b><br>术语库<br>历史记录</div>
</div>
</div>

<div class="card">
<h2>AI能力</h2>
<div class="grid">
<div class="node">翻译</div>
<div class="node">纠错</div>
<div class="node">补全</div>
<div class="node">改写</div>
<div class="node">快捷回复</div>
<div class="node">主动建议</div>
</div>
</div>

<div class="card">
<h2>V1范围</h2>
<table>
<tr><th>功能</th><th>状态</th></tr>
<tr><td>场景识别</td><td>✅</td></tr>
<tr><td>术语翻译</td><td>✅</td></tr>
<tr><td>拼写纠错</td><td>✅</td></tr>
<tr><td>自动替换</td><td>✅</td></tr>
<tr><td>个人记忆</td><td>✅</td></tr>
<tr><td>Agent执行</td><td>❌</td></tr>
<tr><td>浏览器自动操作</td><td>❌</td></tr>
</table>
</div>

</div>
</body>
</html>
